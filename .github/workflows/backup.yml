name: Daily Database Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          mkdir -p backups
          FECHA=$(date +%Y-%m-%d)
          CARPETA="backups/$FECHA"
          mkdir -p "$CARPETA"

          for TABLA in alumnos progreso respuestas ejercicios_profesor config; do
            echo "Exportando $TABLA..."
            curl -s \
              -H "apikey: $SUPABASE_KEY" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              -H "Accept: application/json" \
              "$SUPABASE_URL/rest/v1/$TABLA?select=*" \
              -o "$CARPETA/$TABLA.json"
            echo "✓ $TABLA"
          done

          echo "Backup completado en $CARPETA"

      - name: Eliminar backups con más de 30 días
        run: |
          find backups/ -maxdepth 1 -type d -mtime +30 -exec rm -rf {} +

      - name: Commit y push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "Backup $(date +%Y-%m-%d)"
          git push
